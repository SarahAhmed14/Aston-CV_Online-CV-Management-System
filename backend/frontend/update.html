<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Update CV</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <div class="container">
    <nav>
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
      <a href="register.html">Register</a>
      <a href="create.html">Create CV</a>
      <button id="logoutBtn">Logout</button>
    </nav>

    <div class="small" id="userBox"></div>

    <h1>Update CV</h1>

    <div class="message" id="msg"></div>

    <label>Name *</label>
    <input type="text" id="name" placeholder="Full name">

    <label>Key Programming *</label>
    <input type="text" id="keyprogramming" placeholder="e.g. Java, Python">

    <label>Education *</label>
    <textarea id="education" rows="3"></textarea>

    <label>Profile *</label>
    <textarea id="profile" rows="3"></textarea>

    <label>URL Links *</label>
    <input type="text" id="URLlinks" placeholder="LinkedIn / GitHub etc">

    <button id="updateBtn" type="button">Update</button>
  </div>

  <script src="./js/update.js" defer></script>
</body>
</html>
